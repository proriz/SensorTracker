name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config cmake libffi-dev libssl-dev

      - name: Python deps
        run: pip install buildozer cython==0.29.33 kivy plyer

      - name: Extrair projeto
        run: unzip -o *.zip

      - name: Gerar spec limpo
        run: |
          cat > buildozer.spec << 'EOF'
          [app]
          title = SensorTracker
          package.name = sensortracker
          package.domain = com.seudominio
          source.dir = .
          source.include_exts = py,kv,png,jpg,ttf
          version = 1.0.0
          requirements = python3,kivy,plyer
          orientation = portrait
          fullscreen = 0
          android.minapi = 21
          android.targetapi = 33
          android.archs = arm64-v8a
          android.permissions = ACCESS_FINE_LOCATION,ACCESS_COARSE_LOCATION
          [buildozer]
          log_level = 2
          EOF

      - name: Aceitar licencas
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | buildozer android debug || true

      - name: Build final
        run: buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SensorTracker-APK
          path: bin/*.apk
          retention-days: 7
