name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: sudo apt-get update -qq && sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config cmake libffi-dev libssl-dev
      - run: pip install buildozer cython==0.29.33 kivy plyer
      - run: unzip -o *.zip && buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
