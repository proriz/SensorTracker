name: Build APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config cmake libffi-dev libssl-dev

      - name: Python deps
        run: pip install buildozer cython==0.29.33 kivy plyer

      - name: Extrair projeto
        run: unzip -o *.zip

      - name: Corrigir spec
        run: |
          sed -i 's/kivy==2.3.0/kivy/g' buildozer.spec
          sed -i '/android.add_compile_options/d' buildozer.spec
          sed -i '/android.gradle_dependencies/d' buildozer.spec
          cat buildozer.spec | grep requirements

      - name: Aceitar licencas
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | buildozer android debug || true

      - name: Build final
        run: buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SensorTracker-APK
          path: bin/*.apk
          retention-days: 7
